<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 职位推荐系统</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }
        .login-header p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>用户登录</h1>
                <p>登录后即可使用智能推荐功能</p>
            </div>

            <div id="alert-container"></div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="请输入用户名"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="请输入密码"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem;">
                    登录
                </button>
            </form>

            <div class="text-center mt-3">
                <p style="color: #666;">
                    还没有账号？
                    <a href="register.html" style="color: var(--primary-color); text-decoration: none; font-weight: 500;">立即注册</a>
                </p>
                <p style="margin-top: 1rem;">
                    <a href="index.html" style="color: var(--primary-color); text-decoration: none;">返回首页</a>
                </p>
            </div>
        </div>
    </div>

    <script src="../static/js/api.js"></script>
    <script>
        // 如果已登录，跳转到首页
        if (api.isAuthenticated()) {
            window.location.href = 'index.html';
        }

        // 处理登录表单提交
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const alertContainer = document.getElementById('alert-container');

            // 清空提示
            alertContainer.innerHTML = '';

            // 禁用提交按钮
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';

            try {
                await api.login(username, password);

                // 显示成功提示
                alertContainer.innerHTML = '<div class="alert alert-success">登录成功！即将跳转...</div>';

                // 延迟跳转
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                // 显示错误提示
                alertContainer.innerHTML = `<div class="alert alert-error">登录失败: ${error.message}</div>`;

                // 恢复提交按钮
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            }
        });
    </script>
</body>
</html>
